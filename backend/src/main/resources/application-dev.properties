# ─── Development Profile (dev) ──────────────────────────────────────────
# Use this profile for local system testing.
# Run with: -Dspring.profiles.active=dev

# Database Configuration (Local PostgreSQL)
spring.datasource.url=${DEV_DATABASE_URL:jdbc:postgresql://localhost:5432/Task-Flow}
spring.datasource.username=${DEV_DATABASE_USERNAME:postgres}
spring.datasource.password=${DEV_DATABASE_PASSWORD:kali}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.taskflow=DEBUG
