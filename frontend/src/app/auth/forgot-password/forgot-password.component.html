<div class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden bg-slate-950">
  
  <!-- Ambient Background Accents -->
  <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-blue-600/5 rounded-full blur-[120px]"></div>
  <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-purple-600/5 rounded-full blur-[120px]"></div>

  <div class="w-full max-w-[400px] bg-slate-900/40 backdrop-blur-3xl border border-white/10 rounded-[2.5rem] p-10 shadow-2xl relative z-10 animate-in fade-in zoom-in-95 duration-500">
    
    <div class="flex flex-col items-center text-center space-y-8" *ngIf="!isSent">
      
      <!-- Icon Wrapper -->
      <div class="relative">
        <div class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-2xl text-white shadow-xl shadow-blue-500/10 transition-all duration-500">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
      </div>

      <div class="space-y-1">
        <h2 class="text-2xl font-black text-white tracking-tight">Recover Access</h2>
        <p class="text-slate-400 text-xs font-semibold leading-relaxed px-4 opacity-80">
          Enter your registered email below. We'll send a secure link to reset your password.
        </p>
      </div>

      <form (ngSubmit)="onSubmit()" class="w-full space-y-6">
        <div class="space-y-2 text-left">
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Email Identity</label>
          <div class="relative group">
            <i class="bi bi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-500 transition-colors"></i>
            <input type="email" name="email" [(ngModel)]="email" required
                   placeholder="name@company.com"
                   class="w-full bg-slate-950/50 border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-white text-sm placeholder:text-slate-700 focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all">
          </div>
        </div>

        <button type="submit" [disabled]="isLoading"
                class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white text-xs font-black uppercase tracking-widest rounded-2xl transition-all active:scale-95 disabled:opacity-50 shadow-xl shadow-blue-500/20 flex items-center justify-center gap-3">
          <i class="bi bi-send-fill" *ngIf="!isLoading"></i>
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
          {{ isLoading ? 'Processing...' : 'Send Recovery Link' }}
        </button>
      </form>

      <div class="pt-4">
        <a routerLink="/login" class="text-slate-500 hover:text-white text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-2">
          <i class="bi bi-arrow-left"></i>
          Back to standard entry
        </a>
      </div>
    </div>

    <!-- Success State -->
    <div class="flex flex-col items-center text-center space-y-8" *ngIf="isSent">
      <div class="w-16 h-16 rounded-2xl bg-green-500 flex items-center justify-center text-2xl text-white shadow-xl shadow-green-500/10">
        <i class="bi bi-check-circle-fill"></i>
      </div>
      
      <div class="space-y-1">
        <h2 class="text-2xl font-black text-white tracking-tight">Transmission Sent</h2>
        <p class="text-slate-400 text-xs font-semibold leading-relaxed px-4">
          A security link has been dispatched to <strong class="text-blue-400">{{email}}</strong>. Please check your junk folder if it doesn't arrive within 2 minutes.
        </p>
      </div>

      <button routerLink="/login" class="w-full py-4 bg-white/5 hover:bg-white/10 text-white text-xs font-black uppercase tracking-widest rounded-2xl border border-white/5 transition-all">
        Return to Login
      </button>
    </div>

  </div>

  <div class="mt-8 flex items-center gap-2 opacity-30 grayscale hover:grayscale-0 transition-all duration-500 cursor-default">
    <div class="w-1 h-1 rounded-full bg-blue-500"></div>
    <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">TaskFlow Secure Identity</p>
  </div>
</div>
