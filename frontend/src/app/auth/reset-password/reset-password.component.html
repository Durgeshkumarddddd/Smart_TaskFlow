<div class="min-h-screen flex items-center justify-center p-6 bg-slate-950 relative overflow-hidden">
  <!-- Decorative Elements -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl opacity-50"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl opacity-50"></div>
  </div>

  <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-2xl border border-white/10 rounded-3xl p-8 shadow-2xl relative z-10 animate-in fade-in zoom-in-95 duration-500">
    <div class="flex flex-col items-center text-center space-y-6">
      
      <!-- Icon Container -->
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center text-2xl text-white shadow-xl shadow-blue-500/20 ring-4 ring-white/5">
        <i class="bi bi-key-fill"></i>
      </div>

      <div class="space-y-2">
        <h2 class="text-2xl font-black text-white tracking-tight">Set New Password</h2>
        <p class="text-slate-400 text-sm font-medium leading-relaxed opacity-80">
          Secure your account with a strong, memorable credentials.
        </p>
      </div>

      <!-- Success State -->
      <div *ngIf="isSuccess" class="w-full py-8 flex flex-col items-center space-y-4">
        <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
        <p class="text-emerald-400 font-bold text-sm tracking-widest uppercase">Encryption Updated</p>
        <p class="text-slate-400 text-xs">Redirecting to login portal...</p>
      </div>

      <!-- Error State -->
      <div *ngIf="errorMessage && !isSuccess" class="w-full p-4 bg-rose-500/10 border border-rose-500/20 rounded-2xl">
        <p class="text-rose-400 text-xs font-bold flex items-center justify-center gap-2">
           <i class="bi bi-exclamation-triangle-fill"></i>
           {{ errorMessage }}
        </p>
        <a *ngIf="!oobCode" routerLink="/forgot-password" class="mt-2 block text-white text-[10px] font-black uppercase tracking-widest no-underline opacity-50 hover:opacity-100 transition-opacity">Request New Link</a>
      </div>

      <form (ngSubmit)="onSubmit()" class="w-full space-y-5" *ngIf="!isSuccess && oobCode">
        <div class="space-y-4">
          <div class="space-y-2 text-left">
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">New Password</label>
            <div class="relative group">
              <i class="bi bi-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-500 transition-colors"></i>
              <input type="password" name="newPassword" [(ngModel)]="newPassword" required
                     placeholder="••••••••"
                     class="w-full bg-slate-950/50 border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-white text-sm focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all">
            </div>
          </div>

          <div class="space-y-2 text-left">
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Confirm Identity</label>
            <div class="relative group">
              <i class="bi bi-shield-check absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-500 transition-colors"></i>
              <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required
                     placeholder="••••••••"
                     class="w-full bg-slate-950/50 border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-white text-sm focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all">
            </div>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading"
                class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white text-xs font-black uppercase tracking-widest rounded-2xl transition-all active:scale-[0.98] disabled:opacity-50 shadow-xl shadow-blue-500/20">
          {{ isLoading ? 'Synchronizing...' : 'Update Security Credentials' }}
        </button>
      </form>

      <div class="w-full pt-6 border-t border-white/5">
        <a routerLink="/login" class="text-slate-500 hover:text-white transition-colors text-[10px] font-black uppercase tracking-widest no-underline flex items-center justify-center gap-2">
          <i class="bi bi-arrow-left"></i> Return to login
        </a>
      </div>
    </div>
  </div>
</div>
