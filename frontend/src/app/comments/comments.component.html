<!-- Comments Section -->
<div class="tf-comments-section mt-4">
  <h6 class="fw-bold mb-3">
    <i class="bi bi-chat-dots me-2"></i>Comments
    <span class="badge bg-secondary ms-2" *ngIf="comments.length">{{ comments.length }}</span>
  </h6>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-3">
    <div class="spinner-border spinner-border-sm text-secondary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <span class="ms-2 text-muted small">Loading comments...</span>
  </div>

  <!-- Comment List -->
  <div *ngIf="!isLoading" class="tf-comment-list mb-3" style="max-height:320px;overflow-y:auto;">
    <div *ngIf="comments.length === 0" class="text-muted small text-center py-3">
      <i class="bi bi-chat-left-text d-block mb-1" style="font-size: 1.5rem;"></i>
      No comments yet. Be the first!
    </div>

    <div *ngFor="let comment of comments" class="tf-comment d-flex gap-2 mb-3">
      <!-- Avatar -->
      <div class="tf-comment-avatar flex-shrink-0">
        <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white"
             style="width: 32px; height: 32px; font-size: 0.75rem;"
             [style.background]="getAvatarColor(comment.authorName)">
          {{ getInitial(comment.authorName) }}
        </div>
      </div>

      <!-- Comment Body -->
      <div class="tf-comment-body flex-grow-1">
        <div class="d-flex align-items-center gap-2 mb-1">
          <span class="fw-semibold small">{{ comment.authorName || 'Unknown' }}</span>
          <span class="text-muted" style="font-size: 0.7rem;">{{ comment.createdAt | relativeTime }}</span>
          <!-- Delete button for own comments -->
          <button *ngIf="comment.authorId === currentUserId"
                  class="btn btn-link btn-sm p-0 ms-auto text-danger"
                  style="font-size: 0.75rem;"
                  (click)="deleteComment(comment.id!)"
                  [disabled]="deletingId === comment.id">
            <span *ngIf="deletingId === comment.id" class="spinner-border spinner-border-sm me-1" role="status"></span>
            <i *ngIf="deletingId !== comment.id" class="bi bi-trash"></i>
          </button>
        </div>
        <p class="mb-0 small" style="color: var(--tf-text);">{{ comment.body }}</p>
      </div>
    </div>
  </div>

  <!-- Add Comment Form -->
  <div class="tf-comment-form">
    <div class="d-flex gap-2">
      <textarea
             class="form-control form-control-sm"
             placeholder="Add a comment..."
             [(ngModel)]="newComment"
             [disabled]="isPosting"
             rows="2"
             style="background: var(--tf-surface); color: var(--tf-text); border-color: var(--tf-border); resize: none;"></textarea>
      <button class="btn btn-sm btn-primary align-self-end text-nowrap"
              (click)="postComment()"
              [disabled]="isPosting || !newComment.trim()">
        <span *ngIf="isPosting" class="spinner-border spinner-border-sm me-1" role="status"></span>
        Post Comment
      </button>
    </div>
  </div>
</div>
